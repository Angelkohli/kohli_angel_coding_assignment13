name: CI/CD Pipeline
 
on:

  push:

    branches: [main, develop]

  pull_request:

    branches: [main, develop]
 
jobs:

  code-quality:

    name: Code Quality Checks

    runs-on: ubuntu-latest
 
    strategy:

      matrix:

        node-version: [18.x]
 
    steps:

      - name: Checkout code

        uses: actions/checkout@v3
 
      - name: Setup Node.js

        uses: actions/setup-node@v3

        with:

          node-version: ${{ matrix.node-version }}

          cache: 'npm'
 
      - name: Install dependencies

        run: npm install --legacy-peer-deps
 
      - name: Run Prettier check

        run: npm run format:check

        continue-on-error: false
 
      - name: Run ESLint check

        run: npm run lint

        continue-on-error: false
 
      - name: Run tests

        run: npm run test:ci

        continue-on-error: false
 
      - name: Build application

        run: npm run build

        continue-on-error: false
 
  build-docker:

    name: Build Docker Image

    runs-on: ubuntu-latest

    needs: code-quality

    if: github.ref == 'refs/heads/main'
 
    steps:

      - name: Checkout code

        uses: actions/checkout@v3
 
      - name: Set up Docker Buildx

        uses: docker/setup-buildx-action@v2
 
      - name: Build Docker image

        uses: docker/build-push-action@v4

        with:

          context: .

          push: false

          tags: |

            ${{ secrets.DOCKER_USERNAME }}/kohli-angel-component-library:latest

            ${{ secrets.DOCKER_USERNAME }}/kohli-angel-component-library:${{ github.sha }}

          cache-from: type=gha

          cache-to: type=gha,mode=max
 
  notify:

    name: Notify Results

    runs-on: ubuntu-latest

    needs: [code-quality]

    if: always()
 
    steps:

      - name: Check build status

        run: |

          if [ "${{ needs.code-quality.result }}" == "failure" ]; then

            echo "❌ Build failed! Code quality checks did not pass."

            exit 1

          else

            echo "✅ Build successful! All code quality checks passed."

          fi
 